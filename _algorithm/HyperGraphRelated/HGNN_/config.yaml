#configure feature path
data_root: &d_r ./data
modelnet40_ft: !join [*d_r, ModelNet40_mvcnn_gvcnn.mat]
ntu2012_ft: !join [*d_r, NTU2012_mvcnn_gvcnn.mat]

# Dataset
on_dataset: &o_d NTU2012 # on_dataset: &o_d NTU2012 ModelNet40
use_mvcnn_feature: False
use_gvcnn_feature: True

# Construct Hypergraph
graph_type: &g_t hypergraph
k_list: [10] # k_list: [10, 15]
m_prob: 1.0
is_prob: True
use_mvcnn_hyperedge: False
use_gvcnn_hyperedge: True

#Result
result_root: &r_r ./result/hgnn
result_dir: !join [*r_r, !concat [ *g_t, _, *o_d ]]

#Train
max_epoch: 600
n_hid: 128
lr: 0.001
milestones: [100]
gamma: 0.9
drop_out: 0.5
print_freq: 50
weight_decay: 0.0005
decay_step: 200
decay_rate: 0.7